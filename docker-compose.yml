version: '3.9'

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fund_transfer_php
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://app_user:app_pass@mysql:3306/fund_transfer?serverVersion=8.0
      REDIS_URL: redis://redis:6379

  nginx:
    image: nginx:alpine
    container_name: fund_transfer_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: fund_transfer_mysql
    environment:
      MYSQL_DATABASE: fund_transfer
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: fund_transfer_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: